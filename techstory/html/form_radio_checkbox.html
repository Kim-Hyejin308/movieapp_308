<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="login.html" method="get">
      <input type="radio" name="city" value="1" />서울
      <input type="radio" name="city" value="2" checked />울산
      <input type="radio" name="city" value="3" />남양주

      <br />
      <input type="checkbox" name="berry" value="berry" />딸기
      <input type="checkbox" name="watermelon" value="watermelon" checked />수박
      <input type="checkbox" name="apple" value="apple" />사과
      <br />
      <select name="fruit">
        <option value="1">바나나</option>
        <option value="2" selected="true">딸기</option>
        <option value="3">사과</option>
      </select>
      <br />
      <input type="submit" />
    </form>
  </body>
</html>
