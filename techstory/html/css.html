<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div#em div {
        font-size: 2em;
      } /*부모의 2배*/
      div#rem div {
        font-size: 2em;
      } /*html 기본크기의 2배*/
      div#per div {
        font-size: 200%;
      } /*부모의 200%*/
    </style>
  </head>
  <body>
    <div id="em">
      부모의 2배
      <div>
        부모의 2배
        <div>부모의 2배</div>
      </div>
    </div>

    <div id="rem">
      기본크기의 2배
      <div>
        기본크기의 2배
        <div>기본크기의 2배</div>
      </div>
    </div>

    <div id="per">
      부모의 200%
      <div>
        부모의 200%
        <div>부모의 200%</div>
      </div>
    </div>
  </body>
</html>
