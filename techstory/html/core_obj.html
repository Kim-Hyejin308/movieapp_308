<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 id="msg">ㅋ</h1>
    <script>
      let cities = ["Seoul", "Tokyo", "London"];
      console.log(cities[0]);
      console.log(cities[2]);
      cities[3] = "paris";
      console.log(cities[3]);
      cities[4] = 4;
      console.log(cities[4]);
      cities[5] = function () {};
      console.log(cities[5]);

      let city = new Array(3);
      console.log(city.length);
      console.log(city[4]);
      city[4] = "abc";
      console.log(city[4]);

      city.length = 2;

      for (let index = 0; index < city.length; index++) {
        const element = city[index];
        console.log(city.index);
      }
      console.log(city);

      let now = new Date();
      let date = now.getDate();
      let month = now.getMonth() + 1;
      let hour = now.getHours();
      console.log(now, date, month, hour, now.toLocaleString());

      //접속 시간을 가져와서 방문한 초시간이 짝수이면 보라색 배경 적용
      //홀수이면 하늘색으로 적용

      let sec = now.getSeconds();
      if (sec % 2 === 0) {
        document.body.style.backgroundColor = "#800080";
        document.getElementById("msg").innerText = sec + "초 - 짝수 → 보라색";
      } else {
        document.body.style.backgroundColor = "skyblue";
        document.getElementById("msg").innerText = sec + "초 - 홀수 → 하늘색";
      }

      //string - 불변객체
      let str = "hello";
      str = str + ", java";
      console.log(str.length);
      str.length = 300; //한번 사이즈가 결정되면 바꿀 수가 없다
      console.log(str.length);

      console.log(Math.PI);
      console.log(Math.floor(Math.random() * 10));
    </script>
  </body>
</html>
