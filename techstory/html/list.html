<!doctype html>
<html lang="kr">
  <head>
    <meta .charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list</title>
    <style>
      #menubar {
        background-color: olive;
      }
      #menubar ul {
        margin: 0;
        padding: 0;
        width: 567px;
      }
      #menubar ul li {
        display: inline-block;
        list-style-type: none;
        padding: 0px, 15px;
      }
      #menubar a {
        text-decoration: none;
        color: white;
      }
      #menubar a:hover {
        color: blue;
      }
    </style>
  </head>
  <body>
    <h3>커피메뉴</h3>
    <hr />
    <nav id="menubar">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Espresso</a></li>
        <li><a href="#">Cappuccino</a></li>
        <li><a href="#">Cafe Latte</a></li>
        <li><a href="#">F.A.Q</a></li>
      </ul>
    </nav>
  </body>
</html>
